name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Use the latest npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./packages/vivere/package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Release tag ($tag) does not match package version ($pkg)"
            exit 1
          fi

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Publish packages
        run: |
          for dir in packages/vivere packages/create-vivere; do
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if [ -n "$(npm view "$name@$version" version 2>/dev/null)" ]; then
              echo "$name@$version already on npm, skipping"
            else
              echo "publishing $name@$version"
              (cd "$dir" && npm publish --provenance --access public)
            fi
          done
